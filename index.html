<form id="uploadForm">
    <input type="file" id="fileInput" name="file">
    <button type="submit">Get Symbols</button>
</form>
<pre id="result"></pre>

<script>
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append("file", document.getElementById('fileInput').files[0]);
        
        // This sends the file to your Python backend
        const response = await fetch('/api/get-symbols', { method: 'POST', body: formData });
        const data = await response.json();
        document.getElementById('result').innerText = data.symbols;
    };
</script>
