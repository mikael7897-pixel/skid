<!DOCTYPE html>
<html>
<body>
    <h1>IL2CPP Symbol Getter</h1>
    <input type="file" id="fileInput" />
    <button onclick="processFile()">Get Symbols</button>
    <pre id="result"></pre>

    <script src="https://unpkg.com/lief@0.14.0/dist/lief.js"></script>
    <script>
        async function processFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Pick a file first!");

            const arrayBuffer = await file.arrayBuffer();
            const binary = lief.parse(new Uint8Array(arrayBuffer));
            
            let output = "";
            for (const s of binary.exported_symbols) {
                if (s.name.startsWith("il2cpp_")) {
                    output += s.name + "\n";
                }
            }
            document.getElementById('result').innerText = output;
        }
    </script>
</body>
</html>
