<script>
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const resultDiv = document.getElementById('result');
        
        if (!file) return;

        resultDiv.innerText = "Processing...";
        const arrayBuffer = await file.arrayBuffer();
        const binary = lief.parse(new Uint8Array(arrayBuffer));
        
        let rawOutput = "const raw = {\n";
        let configOutput = "Il2Cpp.$config.exports = {\n";

        for (const s of binary.exported_symbols) {
            if (s.name.startsWith("il2cpp_")) {
                const line = `  "${s.name}": "${s.name}",\n`;
                rawOutput += line;
                configOutput += line;
            }
        }
        
        rawOutput += "};";
        configOutput += "};";

        // Display both formats together
        resultDiv.innerText = rawOutput + "\n\n" + configOutput;
    });
</script>
